  - type: Features
    data:
      - name: Ultra-Low Latency WebRTC Streaming
        description: >-
          Achieve sub-500ms latency with WebRTC-based publish and play,
          enabling real-time interactive video applications like auctions,
          gaming, and telehealth.
      - name: Multi-Protocol Support
        description: >-
          Ingest and deliver streams via RTMP, RTSP, SRT, WebRTC, HLS,
          CMAF, and LL-HLS, supporting a wide range of encoders and players.
      - name: Adaptive Bitrate Streaming
        description: >-
          Automatically transcode streams to multiple bitrate/resolution
          ladders and deliver the optimal quality based on viewer bandwidth.
      - name: Video Recording and VoD
        description: >-
          Record live streams to MP4 or HLS on local disk or cloud storage,
          creating video-on-demand assets from live broadcasts automatically.
      - name: Cluster and Auto-Scaling
        description: >-
          Deploy Ant Media Server in horizontal cluster mode with auto-scaling
          on AWS, Azure, GCP, and Alibaba Cloud for high-concurrency events.
      - name: REST API Management
        description: >-
          Full programmatic control of streams, broadcasts, conferences, and
          server settings via a comprehensive REST API.
  - type: UseCases
    data:
      - name: Telehealth and Remote Consultations
        description: >-
          Enable HIPAA-compliant real-time video consultations between patients
          and healthcare providers with sub-second latency.
      - name: Live E-Commerce and Auctions
        description: >-
          Power interactive live shopping experiences and real-time bidding
          platforms with low-latency video and chat.
      - name: E-Learning and Virtual Classrooms
        description: >-
          Deliver interactive live lectures, webinars, and virtual classrooms
          with two-way video and screen sharing.
      - name: Gaming and Esports Broadcasting
        description: >-
          Broadcast gaming sessions and esports events with RTMP ingest from
          OBS and HLS/WebRTC delivery to viewers at scale.
      - name: Video Surveillance
        description: >-
          Ingest RTSP streams from IP cameras and provide browser-based
          WebRTC viewing with recording and motion detection.
  - type: Integrations
    data:
      - name: OBS Studio
        description: >-
          Ingest live streams from OBS Studio via RTMP for broadcast to
          WebRTC, HLS, or RTSP viewers through Ant Media Server.
      - name: AWS / Azure / GCP
        description: >-
          Deploy Ant Media Server clusters with auto-scaling on major cloud
          platforms using marketplace images and SDK integrations.
      - name: Zoom
        description: >-
          Integrate Zoom meetings and webinars with Ant Media Server for
          re-broadcasting to larger streaming audiences.
  - type: Integrations
    url: https://antmedia.io/marketplace/
