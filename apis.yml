apis:
  - name: Ant Media Server REST API
    description: >-
      The Ant Media Server REST API provides programmatic access to all
      streaming server management functions including stream management,
      broadcast configuration, recording control, token authentication,
      cluster management, and server settings. Supports RTMP ingest, WebRTC
      publish/play, HLS delivery, and adaptive bitrate configuration.
