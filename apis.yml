name: Ant Media
description: >-
  Ant Media Server is a scalable, open-source media server for ultra-low latency
  live streaming and WebRTC-based video applications. It supports WebRTC, RTMP,
  RTSP, SRT, HLS, and CMAF protocols, enabling developers to build real-time
  video applications with sub-second latency. Available in Community (open-source)
  and Enterprise editions with adaptive bitrate streaming, cloud auto-scaling,
  video recording, and REST API management.
